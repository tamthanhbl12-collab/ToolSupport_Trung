// Tạo icon PNG động bằng Canvas
document.addEventListener('DOMContentLoaded',function(){
(function(){
  function makeIcon(size){
    const c=document.createElement('canvas');
    c.width=size;c.height=size;
    const ctx=c.getContext('2d');
    const r=size*0.2;
    // Nền gradient bo góc
    const g=ctx.createLinearGradient(0,0,size,size);
    g.addColorStop(0,'#1a3a6b');
    g.addColorStop(1,'#c0392b');
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.moveTo(r,0);ctx.lineTo(size-r,0);
    ctx.quadraticCurveTo(size,0,size,r);
    ctx.lineTo(size,size-r);
    ctx.quadraticCurveTo(size,size,size-r,size);
    ctx.lineTo(r,size);
    ctx.quadraticCurveTo(0,size,0,size-r);
    ctx.lineTo(0,r);
    ctx.quadraticCurveTo(0,0,r,0);
    ctx.closePath();ctx.fill();
    // Bông lúa
    ctx.font=(size*0.45)+'px serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🌾',size/2,size*0.38);
    // Con heo
    ctx.font=(size*0.3)+'px serif';
    ctx.fillText('🐖',size/2,size*0.75);
    return c.toDataURL('image/png');
  }
  // Tạo icon 192x192 cho Android/iOS
  const url192=makeIcon(192);
  const url32=makeIcon(32);
  // Gán vào link tags
  document.getElementById('apple-icon').href=url192;
  document.getElementById('fav-icon').href=url32;
  // Thêm manifest động cho Android PWA
  const manifest={
    name:'Quản Lý Bán Hàng',
    short_name:'Bán Hàng',
    start_url:'./',
    display:'standalone',
    background_color:'#1a3a6b',
    theme_color:'#1a3a6b',
    icons:[{src:url192,sizes:'192x192',type:'image/png'},{src:url192,sizes:'512x512',type:'image/png'}]
  };
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  const mUrl=URL.createObjectURL(blob);
  const ml=document.createElement('link');
  ml.rel='manifest';ml.href=mUrl;
  document.head.appendChild(ml);
})();
});

// PERSIST
function ld(){
  try{
    const d=localStorage.getItem(SK);
    if(d){
      const p=JSON.parse(d);
      if(p.npps)S.npps=p.npps;
      if(p.products)S.products=p.products;
      if(p.customers)S.customers=p.customers;
      if(p.orders)S.orders=p.orders;
      if(p.imports)S.imports=p.imports;
      if(p.returns)S.returns=p.returns;
      if(p.payments)S.payments=p.payments;
      if(p.stock)S.stock=p.stock;
    }
    // Dọn dẹp SP trùng ID
    const seen={};
    S.products=S.products.filter(p=>{
      if(seen[p.id])return false;
      seen[p.id]=true;
      return true;
    });
    // Dọn dẹp NPP trùng ID
    const seenNpp={};
    S.npps=S.npps.filter(n=>{
      if(seenNpp[n.id])return false;
      seenNpp[n.id]=true;
      return true;
    });
    // Dọn dẹp NPP trùng tên
    const seenNppName={};
    S.npps=S.npps.filter(n=>{
      const key=n.name.trim().toLowerCase();
      if(seenNppName[key])return false;
      seenNppName[key]=true;
      return true;
    });
  }catch(e){}
}

// XUẤT DỮ LIỆU
function xuatDL(){
  const data={
    version:'bh_v8',
    exportDate:new Date().toISOString(),
    npps:S.npps,
    products:S.products,
    customers:S.customers,
    orders:S.orders,
    imports:S.imports,
    returns:S.returns||[]
  };
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const dateStr=new Date().toISOString().slice(0,10);
  a.href=url;
  a.download='banhang_data_'+dateStr+'.json';
  a.click();
  URL.revokeObjectURL(url);
  showT('✅ Đã xuất dữ liệu!');
}

// NHẬP DỮ LIỆU — MERGE thông minh, không ghi đè
function nhapDL(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.products&&!data.npps){showT('⚠️ File không đúng định dạng!');return;}

      // Đếm dữ liệu mới sẽ được thêm vào
      const newProds=(data.products||[]).filter(p=>!S.products.find(x=>x.code===p.code));
      const newNpps=(data.npps||[]).filter(n=>!S.npps.find(x=>x.id===n.id));
      const newCusts=(data.customers||[]).filter(c=>!S.customers.find(x=>x.id===c.id));
      const newOrders=(data.orders||[]).filter(o=>!S.orders.find(x=>x.id===o.id));
      const newImports=(data.imports||[]).filter(i=>!S.imports.find(x=>x.date===i.date&&x.productCode===i.productCode&&x.qty===i.qty));
      const newReturns=(data.returns||[]).filter(r=>!(S.returns||[]).find(x=>x.date===r.date&&x.productCode===r.productCode&&x.qty===r.qty));
      const newPayments=(data.payments||[]).filter(p=>!(S.payments||[]).find(x=>x.id===p.id));

      // Đếm sản phẩm sẽ được cập nhật giá
      const updProds=(data.products||[]).filter(p=>{
        const ex=S.products.find(x=>x.code===p.code);
        if(!ex)return false;
        const newPrices=(p.prices||[]).filter(pr=>!(ex.prices||[]).find(ep=>ep.date===pr.date));
        return newPrices.length>0;
      });

      const info=[
        '📊 MERGE DỮ LIỆU (không ghi đè)',

        '🚛 Nhập kho mới: '+newImports.length+' dòng',
        '📋 Đơn bán mới: '+newOrders.length+' đơn',
        '↩️ Đổi trả mới: '+newReturns.length,
        '━━━━━━━━━━━━━━━━━━━━',
        'Dữ liệu cũ được GIỮ NGUYÊN',
        'Tiếp tục không?'
      ].join('\n');
      if(!confirm(info))return;

      // MERGE NPP
      newNpps.forEach(n=>S.npps.push(n));

      // MERGE sản phẩm: thêm mới + cập nhật giá SP đã có
      newProds.forEach(p=>S.products.push(p));
      S.products.forEach((p,idx)=>{
        const incoming=( data.products||[]).find(x=>x.code===p.code);
        if(!incoming)return;
        // Merge giá: chỉ thêm ngày chưa có
        const existDates=new Set((p.prices||[]).map(x=>x.date));
        const toAdd=(incoming.prices||[]).filter(pr=>!existDates.has(pr.date));
        if(toAdd.length>0){
          S.products[idx]={...p,prices:[...(p.prices||[]),...toAdd].sort((a,b)=>a.date.localeCompare(b.date))};
        }
        // Cập nhật chiết khấu nếu SP cũ chưa có
        if(p.discount&&p.discount.type==='Không có'&&incoming.discount&&incoming.discount.type!=='Không có'){
          S.products[idx]={...S.products[idx],discount:incoming.discount};
        }
      });

      // MERGE khách hàng
      newCusts.forEach(c=>S.customers.push(c));

      // MERGE đơn bán
      newOrders.forEach(o=>S.orders.push(o));

      // MERGE nhập kho
      newImports.forEach(i=>S.imports.push(i));

      // MERGE đổi trả
      if(!S.returns)S.returns=[];
      newReturns.forEach(r=>S.returns.push(r));

      // MERGE công nợ
      if(!S.payments)S.payments=[];

      showT('✅ Merge dữ liệu thành công!');
      render();
      alert(msg);

      showT('❌ Lỗi: '+err.message);
      console.error(err);

async function sbFetch(method,body=null){

// Đẩy dữ liệu lên cloud
async function syncUp(){
  if(isSyncing)return;
  isSyncing=true;
  showSyncStatus('⏫ Đang lưu cloud...');
  try{
    const payload={id:'main',data:{npps:S.npps,products:S.products,customers:S.customers,orders:S.orders,imports:S.imports,returns:S.returns||[],payments:S.payments||[],stock:S.stock||[]},updated_at:new Date().toISOString()};
    const res=await sbFetch('PATCH',payload);
    if(res.ok){lastSyncTime=new Date();showSyncStatus('☁️ Đã lưu '+fmtTime(lastSyncTime));}
    else{showSyncStatus('⚠️ Lỗi lưu cloud');}
  }catch(e){showSyncStatus('📵 Offline');}
  isSyncing=false;
}

// Kéo dữ liệu từ cloud về
async function syncDown(silent=false){
  if(!silent)showSyncStatus('⏬ Đang tải...');
  try{
    const res=await fetch(`${SB_URL}/rest/v1/${SB_TABLE}?id=eq.main&select=data,updated_at`,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    if(!res.ok){if(!silent)showSyncStatus('⚠️ Lỗi tải');return false;}
    const rows=await res.json();

    // Cloud trống → đẩy local lên
    if(!rows||!rows.length||!rows[0].data||Object.keys(rows[0].data).length===0){
      if(!silent)showSyncStatus('☁️ Cloud trống → đang lưu lên...');
      await syncUp();
      return false;
    }

    const d=rows[0].data;
    if(!d.products||d.products.length===0){
      if(!silent)showSyncStatus('☁️ Cloud chưa có dữ liệu → đang lưu lên...');
      await syncUp();
      return false;
    }

    const cloudTime=new Date(rows[0].updated_at);
    const localTimeStr=localStorage.getItem(SK+'_synctime');
    const localTime=localTimeStr?new Date(localTimeStr):new Date(0);

    // So sánh theo THỜI GIAN — cloud mới hơn → tải về
    if(cloudTime>localTime){
      if(!silent){
        const ok=confirm('Cloud có dữ liệu mới hơn ('+fmtTime(cloudTime)+')\nTải về không?');
        if(!ok)return false;
      }
      if(d.npps)S.npps=d.npps;
      if(d.products)S.products=d.products;
      if(d.customers)S.customers=d.customers;
      if(d.orders)S.orders=d.orders;
      if(d.imports)S.imports=d.imports;
      if(d.returns)S.returns=d.returns;
      if(d.payments)S.payments=d.payments;
      if(d.stock)S.stock=d.stock;
      sv();
      localStorage.setItem(SK+'_synctime',cloudTime.toISOString());
      lastSyncTime=cloudTime;
      showSyncStatus('✅ Đã tải '+fmtTime(cloudTime));
      render();
      return true;
    } else {
      if(!silent)showSyncStatus('☁️ Đã đồng bộ '+fmtTime(cloudTime));
      return false;
    }
  }catch(e){if(!silent)showSyncStatus('📵 Offline');return false;}
}

  if(!d)return'';
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');

// IMPORT
function rImport(){
  const s=S.imp;
  const fN=S.npps.filter(n=>n.ind.includes(s.ind));
  const nP=S.products.filter(p=>p.npp===s.npp&&p.ind===s.ind);
  let htB=0;
  const rows=s.rows.map((row,idx)=>{
    const p=row.pid?S.products.find(x=>x.id==row.pid):null;
    const wt=p&&row.qty?(+row.qty)*(p.net||25):0;
    if(p&&p.npp==='HT'&&row.qty)htB+=toBao(+row.qty, p.net||25);
    const d=p&&p.discount?p.discount:{type:'Không có'};
    let bonus=0;
    if(d.type==='Công thức (X+Y)'&&row.qty&&+d.x>0)bonus=Math.floor((+row.qty)/(+d.x))*(+d.y||0);
    const sz=p?hasSZ(p.group):false;
    const szOpts=sz?getSZ(p.group):[];
    const grn=isGr(s.ind);
    return`<div class="tr" style="grid-template-columns:24px 58px 1fr ${grn?'':' 40px'} 48px 64px 52px 62px">
      <span style="font-size:10px;color:#bbb;text-align:center">${idx+1}</span>
      <select class="ts" onchange="sRow('imp',${idx},'pid',this.value)"><option value="">--</option>${nP.map(x=>`<option value="${x.id}" ${x.id==row.pid?'selected':''}>${e(x.code)}</option>`).join('')}</select>
      <div><div style="font-size:11px;color:#222;line-height:1.2">${e(p?p.name:'')}</div>${p?`<div style="font-size:9px;color:#aaa">${p.net}kg${bonus>0?` <b style="color:#27ae60">+${bonus}</b>`:''}</div>`:''}</div>
      ${grn?'':`<span style="font-size:10px;color:#0F6E56;text-align:center">${p&&p.protein>0?p.protein+'%':'—'}</span>`}
      ${sz?`<select class="ts" onchange="sRow('imp',${idx},'size',this.value)">${szOpts.map(z=>`<option value="${e(z)}" ${z===row.size?'selected':''}>${z||'—'}</option>`).join('')}</select>`:`<span style="font-size:10px;color:#bbb;text-align:center">—</span>`}
      <div style="display:flex;flex-direction:column;gap:2px;align-items:center">
        <input class="ti" type="number" min="0" placeholder="0" value="${e(row.qty)}" style="text-align:center;width:100%" onchange="setSafeQty('imp',${idx},this.value)" id="imp_qty_${idx}">
        <div style="display:flex;gap:2px;flex-wrap:wrap;justify-content:center">
          ${[5,10,25,30,50].map(n=>`<button onclick="setImpQty(${idx},${n})" style="padding:1px 4px;border-radius:4px;font-size:9px;border:.5px solid #ddd;background:${+row.qty===n?'#1a3a6b':'#f5f4f0'};color:${+row.qty===n?'#fff':'#555'};cursor:pointer;line-height:1.4">${n}</button>`).join('')}
        </div>
      </div>
      <span style="font-size:11px;font-weight:700;color:#1a3a6b;text-align:right">${wt>0?fmtN(wt):''}</span>
      <input class="ti" type="text" inputmode="numeric" placeholder="0" value="${row.price?fmtN(+row.price):''}" style="color:#c0392b;font-weight:700;text-align:right" onblur="setSafePrice('imp',${idx},this.value)">
    </div>`;
  }).join('');
  const botF=s.npp==='HT'?calcBOT(htB):0;
  const grn=isGr(s.ind);
  const cols=`24px 58px 1fr ${grn?'':' 40px'} 48px 64px 52px 62px`;
  const hdrs=['#','Mã','Tên SP',...(grn?[]:['Đạm']),'Size','SL','KL','Giá/bao'];
  return`<div class="card">
    <div class="g2">
      <div><div class="st">Ngành hàng</div><select class="sel" onchange="S.imp.ind=this.value;S.imp.npp='';render()">${INDS.map(i=>`<option value="${e(i)}" ${i===s.ind?'selected':''}>${e(i)}</option>`).join('')}</select></div>
      <div><div class="st">Nhà phân phối</div><select class="sel" onchange="S.imp.npp=this.value;render()"><option value="">-- Chọn --</option>${fN.map(n=>`<option value="${n.id}" ${n.id===s.npp?'selected':''}>${e(n.name)} - ${e(n.loc)}</option>`).join('')}</select></div>
    </div>
    <div><div class="st">Ngày nhập</div><input class="inp" type="date" value="${s.date}" onchange="S.imp.date=this.value"><div style="font-size:10px;color:#888;margin-top:2px">${fmtD(s.date)}</div></div>
    ${s.npp==='HT'?`<div style="margin-top:8px;background:${botF>0?'#E1F5EE':htB>0?'#FCEBEB':'#f5f4f0'};border-radius:8px;padding:7px 11px"><div style="font-size:12px;font-weight:700;color:${botF>0?'#0F6E56':htB>0?'#A32D2D':'#aaa'}">🚛 BOT: ${htB===0?'Chưa có bao nào':botF>0?fmtN(htB)+' bao → '+fmt(botF):fmtN(htB)+' bao → Không đủ ĐK'}</div><div style="font-size:10px;color:#aaa;margin-top:2px">56–65 bao = 20k · 110–126 bao = 40k</div></div>`:''}
  </div>
  <div style="border-radius:10px;overflow:hidden;border:.5px solid #e0ddd8;margin-bottom:8px">
    <div class="th" style="grid-template-columns:${cols}">${hdrs.map(h=>`<span>${h}</span>`).join('')}</div>
    ${rows}
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn gr" style="flex:1;margin-bottom:0" onclick="addRow('imp')">+ Dòng</button>
    <button class="btn g" style="flex:2;margin-bottom:0" onclick="saveImp()">💾 Lưu nhập kho</button>
  </div>
  ${(()=>{
    // Lần nhập hôm nay (theo ngày đang chọn)
    const todayImps=S.imports.filter(i=>i.date===s.date&&(s.npp===''||i.npp===s.npp));
    if(!todayImps.length)return'';
    // Nhóm theo lần nhập (theo id liên tiếp — mỗi lần saveImp tạo nhiều dòng gần nhau)
    const bySession={};
    todayImps.forEach(i=>{
      const key=i.npp+'_'+i.date;
      if(!bySession[key])bySession[key]={npp:i.npp,date:i.date,items:[],total:0,qty:0};
      bySession[key].items.push(i);
      bySession[key].total+=i.total||0;
      bySession[key].qty+=i.qty||0;
    });
    return`<div style="margin-top:10px">
      <div class="st" style="margin-bottom:6px">📋 Đã nhập ngày ${fmtD(s.date)}</div>
      ${Object.values(bySession).map(sess=>`
        <div class="card" style="margin-bottom:6px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <div><b style="font-size:12px;color:#1a3a6b">${e(nn(sess.npp))}</b></div>
            <div style="display:flex;align-items:center;gap:8px">
              <div style="text-align:right">
                <div style="font-size:12px;font-weight:700;color:#c0392b">${fmt(sess.total)}</div>
                <div style="font-size:10px;color:#888">${sess.qty} đơn vị</div>
              </div>
              <button onclick="xoaNhapKho(${JSON.stringify(sess.items.map(i=>i.id))})" style="padding:4px 10px;border-radius:7px;background:#FCEBEB;color:#c0392b;border:none;font-size:11px;cursor:pointer;font-weight:700">🗑️ Xóa</button>
            </div>
          </div>
          ${sess.items.map(i=>{const p=S.products.find(x=>x.id==i.pid||x.code===i.productCode);const unit=p&&p.net<25?'túi':'bao';return`
            <div style="display:flex;justify-content:space-between;padding:4px 0;border-top:.5px solid #f0ede8;font-size:11px">
              <span style="color:#333"><b>${e(i.productCode)}</b> ${e(p?p.name:i.productName||'')}${i.size?' · '+i.size:''}</span>
              <span style="color:#1a3a6b;font-weight:700">${i.qty} ${unit} · ${fmt(i.total)}</span>
            </div>`;}).join('')}
        </div>`).join('')}
    </div>`;
  })()}`;
}

// ROW HELPERS
function xoaNhapKho(ids){
  if(!confirm('Xóa '+ids.length+' dòng nhập kho này?'))return;
  S.imports=S.imports.filter(i=>!ids.includes(i.id));
  svSync();showT('✅ Đã xóa!');render();
}
function sRow(which,idx,field,val){
  const rows=which==='sell'?S.sell.rows:S.imp.rows;
  rows[idx][field]=val;
  if(field==='pid'){const p=S.products.find(x=>x.id==val);rows[idx].price=p?glp(p):'';rows[idx].size='';}
  render();
}
function setImpQty(idx,val){
  S.imp.rows[idx].qty=val;
  render();
}
function setSafeQty(which,idx,val){
  const v=Math.max(0,+val||0);
  const rows=which==='sell'?S.sell.rows:S.imp.rows;
  rows[idx].qty=v||'';
  render();
}
function setSafePrice(which,idx,val){
  const v=numClean(val);
  const rows=which==='sell'?S.sell.rows:S.imp.rows;
  rows[idx].price=v;
  if(which==='sell')updateTotDisplay();
  render();
}
function addRow(which){
  const r={id:Date.now(),pid:'',qty:'',price:'',size:''};
  if(which==='sell')S.sell.rows.push(r);
  else S.imp.rows.push(r);
  render();
}

// SAVE SELL
function saveSell(){
  const items=S.sell.rows.filter(r=>r.pid&&r.qty).map(r=>({pid:r.pid,qty:+r.qty,price:+r.price||0,size:r.size||''}));
  if(!items.length){showT('⚠️ Chưa có sản phẩm!');return;}
  const tot=items.reduce((a,r)=>a+(r.qty*r.price),0);
  const paid=S.sell.paidNow||0;
  // Nếu đang sửa đơn cũ
  if(S.sell.editId){
    S.orders=S.orders.map(o=>o.id===S.sell.editId?{...o,customerId:+S.sell.cid||null,date:S.sell.date,payMethod:S.sell.pay,note:S.sell.note,items,total:tot,paidNow:paid}:o);
    svSync();S.sell.rows=eR(6);S.sell.note='';S.sell.editId=null;S.sell.paidNow=0;
    showT('✅ Đã cập nhật đơn hàng!');render();return;
  }
  const o={id:NID++,customerId:+S.sell.cid||null,date:S.sell.date,payMethod:S.sell.pay,note:S.sell.note,items,total:tot,ind:S.sell.ind,paidNow:paid};
  S.orders.push(o);
  // Tự động tạo công nợ nếu chọn Công nợ hoặc Kết hợp
  if((S.sell.pay==='Công nợ'||S.sell.pay==='Kết hợp')&&+S.sell.cid){
    const debtAmt=S.sell.pay==='Công nợ'?tot:Math.max(0,tot-paid);
    if(debtAmt>0){
      if(!S.payments)S.payments=[];
      S.payments.push({id:NID++,customerId:+S.sell.cid,orderId:o.id,date:S.sell.date,total:tot,paid:paid,debt:debtAmt,note:S.sell.note,closed:false});
    }
  }
  sv();
  S.sell.rows=eR(6);S.sell.note='';S.sell.paidNow=0;
  showT('✅ Đã lưu đơn hàng!');
  render();viewInv(o.id);
}
function viewInv(id){const o=S.orders.find(x=>x.id===id);if(o)showInv(o);}

// Dùng lại đơn cũ của khách
function dungLaiDon(oid){
  const o=S.orders.find(x=>x.id===oid);
  if(!o)return;
  S.sell.rows=o.items.map((r,i)=>({id:i,pid:r.pid,qty:r.qty,price:r.price,size:r.size||''}));
  // Thêm dòng trống để nhập thêm
  S.sell.rows.push({id:Date.now(),pid:'',qty:'',price:'',size:''});
  S.sell.cid=o.customerId?String(o.customerId):'';
  S.sell.pay=o.payMethod||'Tiền mặt';
  S.sell.editId=null;
  cM();gT('sell');
  showT('✅ Đã copy đơn! Có thể nhập thêm sản phẩm.');
}

// Sửa đơn hàng
function suaDon(oid){
  const o=S.orders.find(x=>x.id===oid);
  if(!o)return;
  S.sell.rows=o.items.map((r,i)=>({id:i,pid:r.pid,qty:r.qty,price:r.price,size:r.size||''}));
  S.sell.rows.push({id:Date.now(),pid:'',qty:'',price:'',size:''});
  S.sell.cid=o.customerId?String(o.customerId):'';
  S.sell.pay=o.payMethod||'Tiền mặt';
  S.sell.date=o.date;
  S.sell.note=o.note||'';
  S.sell.editId=oid;
  cM();gT('sell');
  showT('✏️ Đang sửa đơn #'+oid);
}

// SAVE IMPORT
function saveImp(){
  const valid=S.imp.rows.filter(r=>r.pid&&r.qty);
  if(!valid.length){showT('⚠️ Chưa có sản phẩm!');return;}
  let htB=valid.filter(r=>{const p=S.products.find(x=>x.id==r.pid);return p&&p.npp==='HT';}).reduce((a,r)=>{const p=S.products.find(x=>x.id==r.pid);return a+toBao(+r.qty||0,p?p.net:25);},0);
  valid.forEach(r=>{
    const idx=S.products.findIndex(x=>x.id==r.pid);if(idx<0)return;
    const p=S.products[idx];
    if(+r.price>0&&+r.price!==glp(p))S.products[idx]={...p,prices:[...(p.prices||[]),{price:+r.price,date:S.imp.date}]};
  });
  valid.forEach(r=>{
    const p=S.products.find(x=>x.id==r.pid);
    S.imports.push({id:NID++,npp:S.imp.npp,ind:S.imp.ind,pid:+r.pid,productName:p?p.name:'',productCode:p?p.code:'',qty:+r.qty,price:+r.price||0,net:p?p.net:25,size:r.size||'',weight:(+r.qty)*(p?p.net:25),total:(+r.qty)*(+r.price||0),botFee:p&&p.npp==='HT'?calcBOT(htB):0,date:S.imp.date});
  });
  svSync();S.imp.rows=eR(8);showT('✅ Đã lưu '+valid.length+' dòng!');render();
}

            oninput="S.pf.proteinMax=this.value;rProdList()"

function xoaHangLoat(){
  const checked=S.products.filter(p=>p._sel);
  if(!checked.length){showT('⚠️ Chưa chọn SP nào! Tick vào ô vuông trước SP cần xóa');return;}
  if(!confirm('Xóa '+checked.length+' sản phẩm đã chọn?'))return;
  S.products=S.products.filter(p=>!p._sel);
  svSync();showT('✅ Đã xóa '+checked.length+' SP!');render();
}

function pfSearch(val){
  S.pf.s=val;
  rProdList();
  // Giữ focus và con trỏ không bị nhảy
  const el=document.getElementById('pf_search');
  if(el&&document.activeElement!==el)el.focus();
}

function rProdList(){
  const pf=S.pf;
  const s=(pf.s||'').toLowerCase().trim();
  const fp=S.products.filter(p=>{
    const mi=pf.ind==='Tất cả'||p.ind===pf.ind;
    const mn=pf.npp==='Tất cả'||String(p.npp)===String(pf.npp);
    const ms=!s||p.name.toLowerCase().includes(s)||p.code.toLowerCase().includes(s)||(p.animal&&p.animal.toLowerCase().includes(s));
    const ma=!pf.animal||pf.animal==='Tất cả'||p.animal===pf.animal;
    const mpMin=!pf.proteinMin||p.protein>=(+pf.proteinMin);
    const mpMax=!pf.proteinMax||p.protein<=(+pf.proteinMax);
    return mi&&mn&&ms&&ma&&mpMin&&mpMax;
  });
  const countEl=document.getElementById('pf_count');
  if(countEl)countEl.textContent=`${fp.length} sản phẩm${s?' · "'+pf.s+'"':''}`;

  const listEl=document.getElementById('prod_list');
  if(!listEl)return;

  if(fp.length===0&&s){
    listEl.innerHTML=`<div style="text-align:center;color:#aaa;font-size:13px;padding:3rem 0">Không tìm thấy "<b>${e(pf.s)}</b>"</div>`;
    return;
  }

  // Nhóm SP theo NPP
  const byN={};
  fp.forEach(p=>{if(!byN[p.npp])byN[p.npp]=[];byN[p.npp].push(p);});

  // Lọc NPP theo ngành đang chọn
  const isFiltered=pf.ind!=='Tất cả'||pf.npp!=='Tất cả'||s||(pf.animal&&pf.animal!=='Tất cả')||pf.proteinMin||pf.proteinMax;
  let nppToShow=S.npps.filter(n=>{
    const matchInd=pf.ind==='Tất cả'||n.ind.includes(pf.ind);
    const matchNpp=pf.npp==='Tất cả'||String(n.id)===String(pf.npp);
    // Ẩn NPP không có SP khi đang lọc
    if(isFiltered){
      const hasPS=byN[n.id]&&byN[n.id].length>0;
      if(!hasPS)return false;
    }
    return matchInd&&matchNpp;
  });

  // Thêm NPP cũ có SP trong filter
  const oldNpps=Object.keys(byN)
    .filter(id=>!S.npps.find(n=>String(n.id)===String(id)))
    .map(id=>({id,name:id,loc:'',ind:[],bot:false}));

  const allNpps=[...nppToShow,...oldNpps];

  const hl=txt=>s?txt.replace(new RegExp('('+s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark style="background:#fff3b0;border-radius:2px">$1</mark>'):txt;

  listEl.innerHTML=`
  <div style="border-radius:10px;overflow:hidden;border:.5px solid #e0ddd8">
    <div style="display:grid;grid-template-columns:28px 36px 1fr 85px 60px 44px 85px 56px;background:#1a3a6b;padding:7px 10px;gap:4px;position:sticky;top:0;z-index:5">
      <span style="font-size:10px;color:#fff;font-weight:700"><input type="checkbox" id="sel_all" onclick="toggleSelAll(this.checked)" style="width:13px;height:13px"></span>
      <span style="font-size:10px;color:#fff;font-weight:700">STT</span>
      <span style="font-size:10px;color:#fff;font-weight:700">Mã · Tên sản phẩm</span>
      <span style="font-size:10px;color:#fff;font-weight:700;text-align:right">Đơn giá</span>
      <span style="font-size:10px;color:#fff;font-weight:700;text-align:center">Quy cách</span>
      <span style="font-size:10px;color:#fff;font-weight:700;text-align:center">CK</span>
      <span style="font-size:10px;color:#fff;font-weight:700">Nhà PP</span>
      <span style="font-size:10px;color:#fff;font-weight:700;text-align:center">Thao tác</span>
    </div>
    ${allNpps.map(n=>{
      const ps=byN[n.id]||[];
      const spCount=S.products.filter(p=>String(p.npp)===String(n.id)&&(pf.ind==='Tất cả'||p.ind===pf.ind)).length;
      return`
      <div style="background:linear-gradient(135deg,rgba(26,58,107,0.1),rgba(192,57,43,0.06));padding:6px 10px;border-top:.5px solid #e0ddd8;display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:12px;font-weight:700;color:#1a3a6b">🏭 ${e(n.name)}</span>
          ${n.loc?`<span style="font-size:10px;color:#888">📍${e(n.loc)}</span>`:''}
          <span style="font-size:10px;background:#E1F5EE;color:#0F6E56;padding:2px 7px;border-radius:999px;font-weight:700">${spCount} SP</span>
        </div>
        <button onclick="oProdF({npp:'${n.id}',ind:'${e(n.ind&&n.ind[0]?n.ind[0]:pf.ind!=='Tất cả'?pf.ind:'')}',prices:[{price:0,date:getToday()}],discount:{type:'Không có'}})" 
          style="padding:3px 10px;border-radius:6px;background:#1a3a6b;color:#fff;border:none;font-size:11px;cursor:pointer;font-weight:700">+ Thêm SP</button>
      </div>
      ${ps.length===0?`<div style="padding:8px 12px;font-size:11px;color:#aaa;font-style:italic;border-top:.5px solid #f0ede8">Chưa có sản phẩm${pf.ind!=='Tất cả'?' trong ngành '+pf.ind:''}</div>`:''}
      ${(()=>{
        // Sắp xếp theo giá tăng dần (SP không có giá xuống cuối)
        const isFiltering=pf.animal&&pf.animal!=='Tất cả'||pf.proteinMin||pf.proteinMax||s;
        const sorted=isFiltering?[...ps].sort((a,b)=>{
          const la=glp(a),lb=glp(b);
          if(la>0&&lb>0)return la-lb;
          if(la>0)return -1;
          if(lb>0)return 1;
          return 0;
        }):ps;
        // Giá thấp nhất trong nhóm (chỉ tính SP có giá)
        const pricesOnly=sorted.map(p=>glp(p)).filter(x=>x>0);
        const minPrice=pricesOnly.length?Math.min(...pricesOnly):0;
        return sorted.map((p,idx)=>{
          const lp=glp(p);
          const[bg,tc]=gc(p.group);
          const nObj=S.npps.find(x=>x.id===p.npp);
          const ck=p.discount&&p.discount.type!=='Không có';
          const isBest=isFiltering&&lp>0&&lp===minPrice;
          return`<div style="display:grid;grid-template-columns:28px 36px 1fr 85px 60px 44px 85px 56px;padding:7px 10px;gap:4px;align-items:center;border-top:.5px solid #f0ede8;background:${isBest?'#FFFBEA':idx%2===0?'#fff':'#fafaf8'};cursor:pointer${isBest?';border-left:3px solid #f39c12':''}" onclick="viewProd(${p.id})">
            <div onclick="event.stopPropagation()">
              <input type="checkbox" ${p._sel?'checked':''} onchange="S.products.find(x=>x.id===${p.id})._sel=this.checked" style="width:13px;height:13px">
            </div>
            <div style="font-size:11px;color:#aaa;text-align:center">${idx+1}</div>
            <div>
              <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
                <span style="font-size:12px;font-weight:700;color:#1a3a6b">${hl(e(p.code))}</span>
                ${isBest?`<span style="font-size:9px;background:#f39c12;color:#fff;padding:1px 6px;border-radius:999px;font-weight:700;white-space:nowrap">⭐ Giá tốt</span>`:''}
              </div>
              <div style="font-size:11px;color:#333">${hl(e(p.name))}</div>
              <div style="display:flex;gap:3px;margin-top:1px;flex-wrap:wrap">
                <span class="bdg" style="background:${bg};color:${tc};font-size:9px">${e(p.animal||'—')}</span>
                ${p.size?`<span style="font-size:9px;color:#854F0B">${e(p.size)}</span>`:''}
                ${p.img?`<span style="font-size:9px">📷</span>`:''}
              </div>
            </div>
            <div style="font-size:12px;color:${isBest?'#f39c12':'#c0392b'};font-weight:700;text-align:right">${lp>0?fmtN(lp):'—'}</div>
            <div style="font-size:11px;color:#555;text-align:center">${p.net}kg</div>
            <div style="text-align:center">${ck?`<span style="font-size:11px;color:#0F6E56;font-weight:700">✓</span>`:`<span style="color:#ddd">—</span>`}</div>
            <div style="font-size:10px;color:#888">${e(nObj?nObj.name:p.npp)}</div>
            <div style="display:flex;gap:3px;justify-content:center" onclick="event.stopPropagation()">
              <button class="btn sm e" onclick="eProd(${p.id})" title="Sửa">✏️</button>
              <button class="btn sm d" onclick="dProd(${p.id})" title="Xóa">🗑️</button>
            </div>
          </div>`;
        }).join('');
      })()}`;
    }).join('')}
  </div>`;
}

function toggleSelAll(checked){
  S.products.forEach(p=>p._sel=checked);
  rProdList();
  // Giữ lại trạng thái checkbox "chọn tất cả"
  const el=document.getElementById('sel_all');
  if(el)el.checked=checked;
}

function toggleNpp(id){
  S.oNpp[id]=!S.oNpp[id];
  rProdList();
}
function dProd(id){if(confirm('Xóa sản phẩm này?')){S.products=S.products.filter(p=>p.id!==id);svSync();showT('Đã xóa!');if(S.tab==='products')rProdList();else render();}}
function eProd(id){const p=S.products.find(x=>x.id===id);oProdF(p);}

// XEM CHI TIẾT SẢN PHẨM
function viewProd(id){
  const p=S.products.find(x=>x.id===id);
  if(!p)return;
  const lp=glp(p);
  const n=S.npps.find(x=>x.id===p.npp);
  const[bg,tc]=gc(p.group);
  const prices=[...( p.prices||[])].filter(x=>x.price>0).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,6);
  const totalImported=S.imports.filter(i=>i.pid==p.id).reduce((a,i)=>a+(i.qty||0),0);
  const totalSold=S.orders.reduce((a,o)=>{const it=o.items.find(r=>r.pid==p.id);return a+(it?it.qty:0);},0);
  const stock=Math.max(0,totalImported-totalSold);
  const ck=p.discount&&p.discount.type!=='Không có';

  openSh(`
    <!-- Header -->
    <div style="background:linear-gradient(135deg,#1a3a6b,#c0392b);margin:-16px -13px 14px;padding:16px 14px;border-radius:14px 14px 0 0;color:#fff">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="flex:1">
          <div style="font-size:11px;opacity:.75;margin-bottom:2px">${e(n?n.name:p.npp)} · ${e(p.ind)}</div>
          <div style="font-size:20px;font-weight:700">${e(p.code)}</div>
          <div style="font-size:13px;opacity:.9;margin-top:1px">${e(p.name)}</div>
        </div>
        <span class="bdg" style="background:${bg};color:${tc};font-size:11px;padding:4px 10px">${e(p.animal||p.group)}</span>
      </div>
    </div>

    <!-- Ảnh bao bì -->
    <div style="margin-bottom:12px;text-align:center">
      ${p.img
        ?`<img src="${p.img}" style="max-width:100%;max-height:200px;border-radius:10px;object-fit:contain;border:.5px solid #e0ddd8" onclick="viewFullImg('${p.id}')">`
        :`<div style="background:#f5f4f0;border-radius:10px;padding:24px;color:#bbb;font-size:13px">
            📷 Chưa có ảnh bao bì
            <div style="margin-top:8px"><label style="padding:7px 14px;border-radius:8px;background:#EEEDFE;color:#1a3a6b;font-size:12px;cursor:pointer;font-weight:700">
              📷 Thêm ảnh<input type="file" accept="image/*" onchange="uploadProdImg(${p.id},this)" style="display:none">
            </label></div>
          </div>`
      }
      ${p.img?`<div style="margin-top:6px;display:flex;gap:8px;justify-content:center">
        <label style="padding:5px 12px;border-radius:7px;background:#EEEDFE;color:#1a3a6b;font-size:11px;cursor:pointer;font-weight:700">🔄 Đổi ảnh<input type="file" accept="image/*" onchange="uploadProdImg(${p.id},this)" style="display:none"></label>
        <button onclick="delProdImg(${p.id})" style="padding:5px 12px;border-radius:7px;background:#FCEBEB;color:#c0392b;border:none;font-size:11px;cursor:pointer">🗑️ Xóa ảnh</button>
      </div>`:''}
    </div>

    <!-- Thông tin chính -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      ${[
        {l:'Đạm thô',v:p.protein>0?p.protein+'%':'—',c:'#0F6E56'},
        {l:'Quy cách',v:p.net+'kg/bao',c:'#1a3a6b'},
        {l:'Giá hiện tại',v:lp>0?fmt(lp):'Chưa có',c:'#c0392b'},
        {l:'Tồn kho',v:stock+' bao',c:stock<=0?'#c0392b':stock<=5?'#854F0B':'#0F6E56'},
        {l:'Đã nhập',v:totalImported+' bao',c:'#555'},
        {l:'Đã bán',v:totalSold+' bao',c:'#555'},
      ].map(x=>`<div style="background:#f5f4f0;border-radius:8px;padding:9px 11px">
        <div style="font-size:10px;color:#aaa;margin-bottom:2px">${x.l}</div>
        <div style="font-size:15px;font-weight:700;color:${x.c}">${x.v}</div>
      </div>`).join('')}
    </div>

    <!-- Chiết khấu -->
    ${ck?`<div style="background:#E1F5EE;border-radius:8px;padding:9px 12px;margin-bottom:10px">
      <div style="font-size:11px;font-weight:700;color:#0F6E56;margin-bottom:3px">🎁 Chiết khấu</div>
      <div style="font-size:12px;color:#333">
        ${p.discount.type==='Công thức (X+Y)'?`Mua <b>${p.discount.x}</b> bao tặng <b>${p.discount.y}</b> bao`:
          p.discount.type==='% Phần trăm'?`Giảm <b>${p.discount.value}%</b>`:
          `Giảm <b>${fmt(+p.discount.value)}</b>/lần`}
        ${p.discount.note?`<div style="font-size:10px;color:#555;margin-top:2px">📝 ${e(p.discount.note)}</div>`:''}
      </div>
    </div>`:''}

function uploadProdImg(pid, input){
  const file=input.files[0];
  if(!file)return;
  // Nén ảnh xuống ~100KB
  const reader=new FileReader();
  reader.onload=function(ev){
    const img=new Image();
    img.onload=function(){
      const canvas=document.createElement('canvas');
      // Giữ tỉ lệ, max 600px
      const maxW=600,maxH=600;
      let w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      if(h>maxH){w=Math.round(w*maxH/h);h=maxH;}
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      // Nén JPEG quality 0.7 (~70-100KB)
      const compressed=canvas.toDataURL('image/jpeg',0.7);
      const idx=S.products.findIndex(x=>x.id==pid);
      if(idx>=0){S.products[idx]={...S.products[idx],img:compressed};svSync();showT('✅ Đã lưu ảnh!');viewProd(pid);}
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function delProdImg(pid){
  if(!confirm('Xóa ảnh bao bì?'))return;
  const idx=S.products.findIndex(x=>x.id==pid);
  if(idx>=0){const p={...S.products[idx]};delete p.img;S.products[idx]=p;svSync();showT('Đã xóa ảnh!');viewProd(pid);}
}

function saveProd(id){
  const code=(document.getElementById('fp_code').value||'').trim();
  const name=(document.getElementById('fp_name').value||'').trim();
  if(!code||!name){showT('⚠️ Cần nhập mã và tên!');return;}
  const dt=document.getElementById('fp_dtype').value;
  let discount={type:dt};
  if(dt==='Công thức (X+Y)'){discount.x=document.getElementById('fp_dx')?document.getElementById('fp_dx').value:'';discount.y=document.getElementById('fp_dy')?document.getElementById('fp_dy').value:'';}
  else if(dt!=='Không có')discount.value=document.getElementById('fp_dv')?document.getElementById('fp_dv').value:'';
  const curP=numClean(document.getElementById('fp_price').value);
  const oldP=id>0?S.products.find(x=>x.id===id):null;
  let prices=oldP?[...oldP.prices]:[{price:0,date:getToday()}];
  if(curP>0){
    const latestPrice=prices.length>0?[...prices].sort((a,b)=>b.date.localeCompare(a.date))[0].price:0;
    if(curP!==latestPrice){
      prices=prices.filter(x=>x.date!==getToday());
      prices.push({price:curP,date:getToday()});
    }
  }
  const proteinEl=document.getElementById('fp_protein');
  // Fix: dùng id cố định, không tạo ID mới 2 lần
  const newId=id>0?id:NID++;
  const np={id:newId,code,name,ind:document.getElementById('fp_ind').value,npp:document.getElementById('fp_npp').value,group:document.getElementById('fp_group').value,animal:(document.getElementById('fp_animal').value||''),protein:+(proteinEl?proteinEl.value||0:0),net:+document.getElementById('fp_net').value||25,size:document.getElementById('fp_size').value,prices,discount};
  if(id>0)S.products=S.products.map(x=>x.id===id?np:x);
  else S.products.push(np);
  svSync();
  if(np.npp)S.oNpp[np.npp]=true;
  showT(id>0?'✅ Đã cập nhật!':'✅ Đã thêm SP mới!');
  cM();
  // Cập nhật bảng ngay không cần render toàn bộ
  if(S.tab==='products')rProdList();
  else render();
}

function saveNpp(id){
  const name=(document.getElementById('n_name').value||'').trim();

  const loc=document.getElementById('n_loc').value.trim();

  const bot=document.getElementById('n_bot').checked;
  const ind=INDS.filter((i,idx)=>{const el=document.getElementById('n_i_'+idx);return el&&el.checked;});

  if(id){S.npps=S.npps.map(n=>n.id===id?{...n,name,loc,phone,bot,ind}:n);showT('✅ Đã cập nhật NPP!');}

}

function custSearch(val){
  if(!S.custF)S.custF={s:'',province:'Tất cả',sort:'az'};
  S.custF.s=val;
  S.cs=val;
  rCustList();

function rCustList(){
  const listEl=document.getElementById('cust_list');
  const countEl=document.getElementById('cust_count');
  if(!listEl)return;
  if(!S.custF)S.custF={s:'',province:'Tất cả',ward:'Tất cả',sort:'az',filterNo:false,filterCK:false,filterTM:false,filterMua:false};
  const f=S.custF;
  const s=(f.s||'').toLowerCase();

  let cs=S.customers.filter(c=>{
    if(!c.name)return false;
    // Tìm kiếm
    const ms=!s||c.name.toLowerCase().includes(s)||(c.phone&&c.phone.includes(f.s))||(c.licensePlate&&c.licensePlate.toLowerCase().includes(s));
    // Khu vực
    const mp=f.province==='Tất cả'||c.province===f.province;
    // Phường
    const mw=!f.ward||f.ward==='Tất cả'||c.ward===f.ward;
    // Checkbox filters
    const hasDebt=(S.payments||[]).some(p=>p.customerId===c.id&&!p.closed);
    const hasMua=S.orders.some(o=>o.customerId===c.id);
    const isCK=c.payMethod==='Chuyển khoản';
    const isTM=c.payMethod==='Tiền mặt';
    if(f.filterNo&&!hasDebt)return false;
    if(f.filterMua&&!hasMua)return false;
    if(f.filterCK&&!isCK)return false;
    if(f.filterTM&&!isTM)return false;
    return ms&&mp&&mw;
  });

  // Sắp xếp
  if(f.sort==='az')cs=[...cs].sort((a,b)=>a.name.localeCompare(b.name,'vi'));
  else if(f.sort==='mua')cs=[...cs].sort((a,b)=>{
    const ta=S.orders.filter(o=>o.customerId===a.id).reduce((x,o)=>x+o.total,0);
    const tb=S.orders.filter(o=>o.customerId===b.id).reduce((x,o)=>x+o.total,0);
    return tb-ta;
  });
  else if(f.sort==='no')cs=[...cs].sort((a,b)=>{
    const da=(S.payments||[]).filter(p=>p.customerId===a.id&&!p.closed).reduce((x,p)=>x+p.debt,0);
    const db=(S.payments||[]).filter(p=>p.customerId===b.id&&!p.closed).reduce((x,p)=>x+p.debt,0);
    return db-da;
  });

  // Thống kê khu vực
  let regionStats='';
  if(f.province!=='Tất cả'||f.ward!=='Tất cả'){
    const allOrders=cs.flatMap(c=>S.orders.filter(o=>o.customerId===c.id));
    const prodCount={};
    allOrders.forEach(o=>o.items.filter(r=>r.pid&&r.qty).forEach(r=>{
      const p=S.products.find(x=>x.id==r.pid);if(!p)return;
      if(!prodCount[p.code])prodCount[p.code]={code:p.code,name:p.name,qty:0};
      prodCount[p.code].qty+=r.qty;
    }));
    const top=Object.values(prodCount).sort((a,b)=>b.qty-a.qty).slice(0,4);
    if(top.length>0){
      regionStats=`<div style="background:#EEEDFE;border-radius:10px;padding:10px 12px;margin-bottom:8px">
        <div style="font-size:12px;font-weight:700;color:#3C3489;margin-bottom:6px">📊 SP bán chạy tại ${e(f.ward!=='Tất cả'?f.ward+', ':'')}${e(f.province)}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${top.map((x,i)=>`<span style="background:#fff;padding:4px 10px;border-radius:7px;font-size:11px;color:#3C3489">
            ${i+1}. ${e(x.code)} · <b>${fmtN(x.qty)} bao</b>
          </span>`).join('')}
        </div>
        <div style="font-size:11px;color:#888;margin-top:5px">${cs.length} khách · DT: <b style="color:#c0392b">${fmt(allOrders.reduce((a,o)=>a+o.total,0))}</b></div>
      </div>`;
    }
  }

  if(countEl)countEl.textContent=cs.length+' khách hàng';

  if(cs.length===0){
    listEl.innerHTML=regionStats+`<div style="text-align:center;color:#aaa;font-size:13px;padding:3rem 0">Không tìm thấy khách hàng nào</div>`;
    return;
  }

  // Bảng cuộn
  listEl.innerHTML=regionStats+`
  <div style="border-radius:10px;overflow:hidden;border:.5px solid #e0ddd8">
    <div style="display:grid;grid-template-columns:1fr 90px 90px 80px 60px;background:#1a3a6b;padding:7px 10px;gap:4px;position:sticky;top:0;z-index:5">
      <span style="font-size:11px;color:#fff;font-weight:700">Khách hàng</span>
      <span style="font-size:11px;color:#fff;font-weight:700;text-align:right">Đã mua</span>
      <span style="font-size:11px;color:#fff;font-weight:700;text-align:right">Còn nợ</span>
      <span style="font-size:11px;color:#fff;font-weight:700">Khu vực</span>
      <span style="font-size:11px;color:#fff;font-weight:700;text-align:center">Thao tác</span>
    </div>
    ${cs.map((c,idx)=>{
      const nc=NC[c.custNote];
      const ct=S.orders.filter(o=>o.customerId===c.id).reduce((a,o)=>a+o.total,0);
      const debt=(S.payments||[]).filter(p=>p.customerId===c.id&&!p.closed).reduce((a,p)=>a+p.debt,0);
      const prodQ={};
      S.orders.filter(o=>o.customerId===c.id).forEach(o=>o.items.filter(r=>r.pid&&r.qty).forEach(r=>{
        if(!prodQ[r.pid])prodQ[r.pid]=0;prodQ[r.pid]+=r.qty;
      }));
      const topProd=Object.entries(prodQ).sort((a,b)=>b[1]-a[1]).slice(0,2).map(([pid,qty])=>{
        const p=S.products.find(x=>x.id==pid);return p?p.code+'×'+qty:'';
      }).filter(Boolean).join(', ');
      return`<div style="display:grid;grid-template-columns:1fr 90px 90px 80px 60px;padding:8px 10px;gap:4px;align-items:center;border-top:.5px solid #f0ede8;background:${idx%2===0?'#fff':'#fafaf8'};cursor:pointer" onclick="S.selCust=S.customers.find(x=>x.id===${c.id});render()">
        <div>
          <div style="display:flex;align-items:center;gap:5px;margin-bottom:1px">
            <span style="font-size:13px;font-weight:700;color:#1a3a6b">${e(c.name)}</span>
            ${c.custNote&&nc?`<span class="bdg" style="background:${nc[0]};color:${nc[1]};font-size:9px">${e(c.custNote)}</span>`:''}
          </div>
          <div style="font-size:10px;color:#888">${[c.phone,c.licensePlate].filter(Boolean).join(' · ')}</div>
          ${topProd?`<div style="font-size:10px;color:#185FA5">🛍️ ${topProd}</div>`:''}
        </div>
        <div style="font-size:12px;color:#0F6E56;font-weight:700;text-align:right">${ct>0?fmt(ct):'—'}</div>
        <div style="font-size:12px;font-weight:700;text-align:right;color:${debt>0?'#c0392b':'#aaa'}">${debt>0?fmt(debt):'—'}</div>
        <div style="font-size:10px;color:#888">${[c.ward,c.province].filter(Boolean).join(', ')}</div>
        <div style="display:flex;gap:3px;justify-content:center" onclick="event.stopPropagation()">
          <button class="btn sm e" onclick="oCustF(${c.id})">✏️</button>
          <button class="btn sm d" onclick="dCust(${c.id})">🗑️</button>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function setPer(p){
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  let from,to=getToday();
  if(p==='day'){from=getToday();}
  else if(p==='week'){const d=new Date(now);d.setDate(d.getDate()-6);from=d.toISOString().slice(0,10);}
  else{from=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-01';}
  S.rpt.per=p;S.rpt.from=from;S.rpt.to=to;render();
}

function rPriceList(){
  const r=S.rpt;
  const s=(r.pcode||'').toLowerCase().trim();
  const allP=S.products;
  const fp=s?allP.filter(p=>p.code.toLowerCase().includes(s)||p.name.toLowerCase().includes(s)||(p.animal&&p.animal.toLowerCase().includes(s))):allP;

  const countEl=document.getElementById('pr_count');
  if(countEl)countEl.textContent=fp.length+' sản phẩm'+(s?' cho "'+r.pcode+'"':'');

  const listEl=document.getElementById('pr_list');
  if(!listEl)return;

  // Nhóm theo animal+group để so sánh NPP
  const groups={};
  fp.forEach(p=>{
    const key=(p.animal||p.name)+'|'+(p.group||'');
    if(!groups[key])groups[key]={label:p.animal||p.name,group:p.group,products:[]};
    groups[key].products.push(p);
  });

  if(Object.keys(groups).length===0){
    listEl.innerHTML=`<div class="card" style="text-align:center;color:#aaa;font-size:12px;padding:2rem 0">${s?`Không tìm thấy "<b>${e(r.pcode)}</b>"`:'Chưa có sản phẩm nào'}</div>`;
    return;
  }

  const groupBlocks=Object.values(groups).filter(g=>g.products.length>0).map(g=>{
    const priced=g.products.map(p=>({...p,lp:glp(p)})).filter(x=>x.lp>0).sort((a,b)=>a.lp-b.lp);
    const best=priced[0];
    const worst=priced[priced.length-1];
    const[gbg,gtc]=gc(g.group);

    return`<div class="card" style="margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">
        <span class="bdg" style="background:${gbg};color:${gtc};font-size:10px">${e(g.group)}</span>
        <span style="font-size:14px;font-weight:700;color:#1a3a6b">${e(g.label)}</span>
        <span style="font-size:11px;color:#888">(${g.products.length} NPP)</span>
      </div>
      ${priced.length>=2?`<div style="background:#E1F5EE;border-radius:8px;padding:8px 10px;margin-bottom:8px;display:flex;gap:8px;align-items:flex-start">
        <div style="font-size:18px">🏆</div>
        <div>
          <div style="font-size:11px;color:#0F6E56;font-weight:700">NPP giá tốt nhất: ${e(nn(best.npp))} — ${fmt(best.lp)}/bao</div>
          <div style="font-size:10px;color:#555;margin-top:2px">Chênh lệch so với cao nhất: <b style="color:#c0392b">+${fmtN(worst.lp-best.lp)}đ/bao</b> (${e(nn(worst.npp))})</div>
        </div>
      </div>`:''}
      ${g.products.map(p=>{
        const lp=glp(p);
        const sorted=[...p.prices].filter(x=>x.price>0).sort((a,b)=>a.date.localeCompare(b.date));
        const isBest=best&&p.id===best.id&&priced.length>=2;
        const isWorst=worst&&p.id===worst.id&&priced.length>=2&&best.id!==worst.id;
        const spark=sorted.length>=2?rSparkline(sorted,160,36):'';
        const trend=sorted.length>=2?(sorted[sorted.length-1].price>sorted[sorted.length-2].price?'▲':'▼'):'—';
        const trendC=trend==='▲'?'#c0392b':trend==='▼'?'#27ae60':'#888';
        const diff=sorted.length>=2?sorted[sorted.length-1].price-sorted[sorted.length-2].price:0;
        return`<div style="border:.5px solid ${isBest?'#27ae60':'#e0ddd8'};border-radius:9px;padding:9px 10px;margin-bottom:6px;background:${isBest?'#f5fff9':'#fff'}">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:5px">
                <span style="font-size:12px;font-weight:700;color:#1a3a6b">${e(nn(p.npp))}</span>
                ${isBest?`<span class="bdg" style="background:#E1F5EE;color:#0F6E56">🏆 Tốt nhất</span>`:''}
                ${isWorst?`<span class="bdg" style="background:#FCEBEB;color:#c0392b">Cao nhất</span>`:''}
              </div>
              <div style="font-size:10px;color:#888">[${e(p.code)}] ${e(p.name)}</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:14px;font-weight:700;color:${isBest?'#27ae60':'#c0392b'}">${lp>0?fmt(lp):'Chưa có'}</div>
              ${diff!==0?`<div style="font-size:10px;color:${trendC};font-weight:700">${trend} ${fmtN(Math.abs(diff))}đ</div>`:`<div style="font-size:10px;color:#aaa">—</div>`}
            </div>
            <button onclick="openAddPrice(${p.id})" style="padding:5px 8px;border-radius:7px;background:#EEEDFE;color:#1a3a6b;border:none;font-size:10px;cursor:pointer;font-weight:700;white-space:nowrap">+ Giá</button>
          </div>
          ${spark?`<div style="margin-bottom:4px">${spark}</div>`:''}
          ${sorted.length>0?`<div style="border-top:.5px solid #f0ede8;padding-top:5px">
            ${[...sorted].reverse().slice(0,4).map((pr,i)=>`<div style="display:flex;justify-content:space-between;padding:2px 0">
              <span style="font-size:10px;color:#aaa">${fmtD(pr.date)}</span>
              <span style="font-size:10px;font-weight:700;color:${i===0?'#c0392b':'#888'}">${fmt(pr.price)}${i===0?' ◀':''}</span>
            </div>`).join('')}
          </div>`:'<div style="font-size:10px;color:#aaa;text-align:center;padding:4px 0">Chưa có lịch sử giá · <span style="color:#1a3a6b;cursor:pointer" onclick="openAddPrice('+p.id+')">+ Thêm giá</span></div>'}
        </div>`;
      }).join('')}
    </div>`;
  }).join('');

  listEl.innerHTML=groupBlocks;
}

// Vẽ sparkline SVG mini
function rSparkline(pts,w,h){
  if(pts.length<2)return'';
  const prices=pts.map(x=>x.price);
  const mn=Math.min(...prices),mx=Math.max(...prices);
  const range=mx-mn||1;
  const xStep=w/(pts.length-1);
  const points=pts.map((x,i)=>{
    const px=i*xStep;
    const py=h-((x.price-mn)/range*(h-6))-3;
    return`${px.toFixed(1)},${py.toFixed(1)}`;
  }).join(' ');
  const last=pts[pts.length-1];
  const prev=pts[pts.length-2];
  const up=last.price>=prev.price;
  const color=up?'#c0392b':'#27ae60';
  const lastX=((pts.length-1)*xStep).toFixed(1);
  const lastY=(h-((last.price-mn)/range*(h-6))-3).toFixed(1);
  return`<svg width="${w}" height="${h}" style="display:block;overflow:visible">
    <polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${lastX}" cy="${lastY}" r="3" fill="${color}"/>
  </svg>`;
}

function saveMarketPrice(pid){
  const date=document.getElementById('ap_date').value||getToday();

  if(!price){showT('⚠️ Cần nhập giá!');return;}

  const prices=p.prices.filter(x=>x.date!==date);
  prices.push({price,date,ref:true}); // ref=true: giá tham khảo
  S.products[idx]={...p,prices};

function saveBulkPrice(){
  const date=document.getElementById('bp_date').value||getToday();

  S.products.forEach((p,idx)=>{

    count++;
  });
  svSync();showT(`✅ Đã lưu ${count} giá tham khảo!`);cM();render();
}

function getDebtSummary(){
  // Tính tổng nợ theo khách: cộng dồn tất cả bill chưa đóng
  const pays=S.payments||[];
  const byC={};
  pays.forEach(p=>{
    if(!byC[p.customerId])byC[p.customerId]={custId:p.customerId,total:0,paid:0,debt:0,orders:[],lastDate:''};
    byC[p.customerId].total+=p.total;
    byC[p.customerId].paid+=p.paid||0;
    byC[p.customerId].debt+=p.closed?0:p.debt;
    byC[p.customerId].orders.push(p);
    if(p.date>byC[p.customerId].lastDate)byC[p.customerId].lastDate=p.date;
  });
  return Object.values(byC).filter(x=>x.debt>0).sort((a,b)=>b.debt-a.debt);
}

// ==================== DỰ BÁO ====================
function getForecast(){
  const results=[];
  S.customers.forEach(c=>{
    const cOrders=S.orders.filter(o=>o.customerId===c.id).sort((a,b)=>a.date.localeCompare(b.date));
    if(cOrders.length<2&&!c.nextDate)return;
    // Tính chu kỳ trung bình
    let avgCycle=null;
    if(cOrders.length>=2){
      const gaps=[];
      for(let i=1;i<cOrders.length;i++){
        const d1=new Date(cOrders[i-1].date);
        const d2=new Date(cOrders[i].date);
        gaps.push((d2-d1)/(1000*60*60*24));
      }
      avgCycle=Math.round(gaps.reduce((a,b)=>a+b,0)/gaps.length);
    }
    // Ngày dự báo tiếp theo
    let nextDate=c.nextDate||null;
    if(!nextDate&&avgCycle&&cOrders.length>0){
      const lastDate=new Date(cOrders[cOrders.length-1].date);
      lastDate.setDate(lastDate.getDate()+avgCycle);
      nextDate=lastDate.toISOString().slice(0,10);
    }
    if(!nextDate)return;
    // Sản phẩm thường mua
    const prodCount={};
    cOrders.slice(-3).forEach(o=>{
      o.items.forEach(it=>{
        const p=S.products.find(x=>x.id==it.pid);
        if(p){prodCount[p.code]=(prodCount[p.code]||0)+it.qty;}
      });
    });
    const topItems=Object.entries(prodCount).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([code,qty])=>code+'×'+qty).join(', ');
    results.push({custId:c.id,nextDate,avgCycle,items:topItems||'Chưa xác định'});
  });
  return results.sort((a,b)=>a.nextDate.localeCompare(b.nextDate));
}

// ==================== TỒN KHO ====================
function getStock(pid){
  if(!pid)return 0;
  // Cách 1: nhập - bán
  const imported=S.imports.filter(i=>i.pid==pid).reduce((a,i)=>a+(i.qty||0),0);
  const sold=S.orders.reduce((a,o)=>{
    const it=o.items.find(r=>r.pid==pid);
    return a+(it?it.qty:0);
  },0);
  const returned=S.returns.filter(r=>r.pid==pid).reduce((a,r)=>a+(r.qty||0),0);
  const autoStock=imported-sold+returned;
  // Cách 2: thủ công (nếu có)
  const manual=(S.stock||[]).find(x=>x.pid==pid);
  return manual?manual.qty:Math.max(0,autoStock);
}

// AI ĐỌC ẢNH BÁO GIÁ
async function aiReadPriceImg(input){
  var file=input.files[0];
  if(!file)return;
  var statusEl=document.getElementById('ai_price_status');
  if(statusEl)statusEl.innerHTML='<div style="background:#EEF3FF;border-radius:10px;padding:12px;font-size:13px;color:#1a3a6b;text-align:center">🤖 AI đang đọc ảnh...</div>';
  var b64=await new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result.split(',')[1]);};r.onerror=rej;r.readAsDataURL(file);});
  var mime=file.type||'image/jpeg';
  var knownCodes=S.products.map(function(p){return p.code;}).join(', ');
  var today=getToday();
  var prompt='Đây là bảng báo giá. Mã SP có sẵn: '+knownCodes+'. Trả về JSON ONLY: {"npp":"tên","date":"YYYY-MM-DD","items":[{"code":"mã","price":giá_số}]}. Giá là đồng/bao, ưu tiên giá NET, chỉ trả JSON.';
  try{
    var resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mime,data:b64}},{type:'text',text:prompt}]}]})});
    var data=await resp.json();
    var text=data.content.map(function(c){return c.text||'';}).join('');
    var parsed;
    try{parsed=JSON.parse(text.replace(/```json|```/g,'').trim());}
    catch(e2){if(statusEl)statusEl.innerHTML='<div style="background:#FCEBEB;border-radius:10px;padding:12px;color:#c0392b">❌ AI không đọc được. Thử ảnh rõ hơn!</div>';return;}
    var items=parsed.items||[];
    var matched=[],notFound=[];
    items.forEach(function(it){
      var found=S.products.find(function(p){return p.code.toLowerCase()===it.code.toLowerCase();});
      if(found){matched.push({code:it.code,price:it.price,name:found.name});}
      else{notFound.push(it.code);}
    });
    window._aiPriceResult={items:matched,date:parsed.date||today};
    var html='<div style="background:#fff;border:.5px solid #e0ddd8;border-radius:10px;padding:12px;margin-bottom:8px">';
    html+='<div style="font-size:13px;font-weight:700;color:#1a3a6b;margin-bottom:8px">🤖 Đọc được '+items.length+' mã · 🏭 '+(parsed.npp||'?')+' · 📅 '+(parsed.date||today)+'</div>';
    if(matched.length){
      html+='<div style="font-size:11px;color:#0F6E56;font-weight:700;margin-bottom:4px">✅ Khớp '+matched.length+' mã:</div>';
      matched.forEach(function(it){html+='<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:.5px solid #f0ede8;font-size:12px"><span style="color:#1a3a6b;font-weight:700">'+it.code+'</span><span style="color:#333;flex:1;margin:0 6px;font-size:11px;overflow:hidden">'+it.name+'</span><span style="color:#c0392b;font-weight:700">'+fmt(it.price)+'</span></div>';});
    }
    if(notFound.length){html+='<div style="font-size:11px;color:#888;margin-top:6px">⚠️ Không tìm thấy: '+notFound.join(', ')+'</div>';}
    html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">';
    html+='<button onclick="confirmAiPrice()" style="padding:9px;border-radius:9px;background:linear-gradient(135deg,#1a3a6b,#c0392b);color:#fff;border:none;font-weight:700;font-size:13px;cursor:pointer">💾 Lưu '+matched.length+' mã</button>';
    html+='<button onclick="document.getElementById(\'ai_price_status\').innerHTML=\'\'" style="padding:9px;border-radius:9px;background:#f0ede8;color:#555;border:none;font-size:13px;cursor:pointer">Hủy</button>';
    html+='</div></div>';
    if(statusEl)statusEl.innerHTML=html;
    input.value='';
  }catch(err){if(statusEl)statusEl.innerHTML='<div style="background:#FCEBEB;border-radius:10px;padding:12px;color:#c0392b">❌ Lỗi: '+err.message+'</div>';}
}

function confirmAiPrice(){
  const res=window._aiPriceResult;
  if(!res||!res.items)return;
  const items=res.items, date=res.date;
  let count=0;
  items.forEach(it=>{
    const idx=S.products.findIndex(p=>p.code.toLowerCase()===it.code.toLowerCase());
    if(idx>=0){
      const p=S.products[idx];
      const already=(p.prices||[]).find(pr=>pr.date===date&&pr.price===it.price);
      if(!already){S.products[idx]={...p,prices:[...(p.prices||[]),{price:it.price,date}]};count++;}
    }
  });
  svSync();
  window._aiPriceResult=null;
  document.getElementById('ai_price_status').innerHTML=`<div style="background:#E1F5EE;border-radius:10px;padding:10px;font-size:13px;color:#0F6E56;font-weight:700;text-align:center">✅ Đã lưu ${count} giá mới!</div>`;
  setTimeout(()=>{const el=document.getElementById('ai_price_status');if(el)el.innerHTML='';rPriceList();},2000);
}
